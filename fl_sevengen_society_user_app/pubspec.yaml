name: fl_sevengen_society_user_app
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  page_transition: ^2.1.0
  intl_phone_field: ^3.2.0
  iconify_flutter: ^0.0.5
  ionicons: ^0.2.2
  pinput: ^3.0.1
  im_animations: ^0.1.2
  intl: ^0.19.0
  dotted_border: ^2.1.0
  flutter_credit_card: ^3.0.7
  readmore: ^2.2.0
  flutter_swipe_button: ^2.1.1+1
  shared_preferences: ^2.2.2
  flutter_launcher_icons: ^0.13.1
  get: ^4.6.6
  get_storage: ^2.1.1
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.1
  device_info_plus: ^9.1.1
  http: ^1.1.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.6
  flutter_local_notifications: ^16.2.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  image_cropper: ^5.0.0
  flutter_svg: ^2.0.9
  js: ^0.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/splash/
    - assets/onboarding/
    - assets/auth/
    - assets/home/
    - assets/members/
    - assets/call/
    - assets/chat/
    - assets/visitor/
    - assets/preApproveVisitors/
    - assets/success/
    - assets/payment/
    - assets/creditcard/
    - assets/bookAmenities/
    - assets/selectAmenities/
    - assets/helpDesk/
    - assets/complaintDetail/
    - assets/notification/
    - assets/messages/
    - assets/services/
    - assets/profile/
    - assets/getSupport/
    - languages/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
          weight: 400
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700