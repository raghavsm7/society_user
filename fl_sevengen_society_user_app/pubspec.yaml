name: fl_sevengen_society_user_app
description: A new Flutter project.
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: '>=3.0.3 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  page_transition: ^2.0.9
  intl_phone_field: ^3.2.0
  iconify_flutter: ^0.0.5
  ionicons: ^0.2.2
  pinput: ^3.0.0
  im_animations: ^0.1.2
  intl: ^0.19.0
  dotted_border: ^2.0.0+3
  flutter_credit_card: ^3.0.7
  readmore: ^2.2.0
  flutter_swipe_button: ^2.1.1+1
  shared_preferences: ^2.2.0
  flutter_launcher_icons: ^0.13.1
  get: ^4.6.1
  get_storage: ^2.0.3
  connectivity_plus: ^2.2.1
  url_launcher: ^6.0.17
  device_info_plus: ^3.2.2
  http: ^1.1.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^9.2.0
  firebase_core: ^3.8.0
  cached_network_image: ^3.2.0
  image_picker: ^0.8.4+4
  image_cropper: ^1.4.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

dependency_overrides:
  firebase_messaging_platform_interface: ^4.5.48
  firebase_core_platform_interface: ^5.3.0
  firebase_crashlytics_platform_interface: ^3.6.46
  cloud_firestore_platform_interface: ^6.5.0
  firebase_auth_platform_interface: ^7.4.9
  firebase_storage_platform_interface: ^5.1.33
  cloud_functions_platform_interface: ^5.5.39

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/splash/
    - assets/onboarding/
    - assets/auth/
    - assets/home/
    - assets/members/
    - assets/call/
    - assets/chat/
    - assets/visitor/
    - assets/preApproveVisitors/
    - assets/success/
    - assets/payment/
    - assets/creditcard/
    - assets/bookAmenities/
    - assets/selectAmenities/
    - assets/helpDesk/
    - assets/complaintDetail/
    - assets/notification/
    - assets/messages/
    - assets/services/
    - assets/profile/
    - assets/getSupport/
    - languages/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
          weight: 400
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
